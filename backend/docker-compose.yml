services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: qeet_identity
    ports:
      - "5001:5001"
    volumes:
      - qeet_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qeet -d qeet_identity"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SERVICE_NAME: qeet-identity
      SERVICE_ENV: dev
      HTTP_PORT: "4000"
      LOG_LEVEL: info
      DB_URL: postgres://postgres:password@postgres:5001/qeet_identity?sslmode=disable
      JWT_SECRET: dev-secret-do-not-use-in-prod-32b
      JWT_ISSUER: qeet-identity
      JWT_AUDIENCE: qeet-identity
      ACCESS_TOKEN_TTL: 15m
      REFRESH_TOKEN_TTL: 720h
      ALLOWED_ORIGINS: http://localhost:3000,http://localhost:5173
      AUTH_DEV_TRUST_HEADERS: "true"
    ports:
      - "4000:4000"

volumes:
  qeet_pgdata:
